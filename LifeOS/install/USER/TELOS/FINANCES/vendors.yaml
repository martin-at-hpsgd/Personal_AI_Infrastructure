# > 💰 SAMPLE TEMPLATE — Replace with your own data via /interview or by editing this file. Real Pulse Finance dashboards populate from here once you've run the Finances interview.
#
# Known vendors — every entity that sends or receives money from you.
# Pulse uses this to classify statement line items, attach categories to obligations,
# and recognize new vs. known counterparties.
#
# Schema (see schema.yaml for full definitions):
#   name:     string  — vendor display name (use "Sample Vendor X" until populated)
#   purpose:  string  — short description of what they bill for or pay you for
#   category: string  — housing | utilities | insurance | subscription | loan | tax |
#                       income | grocery | dining | travel | software | health | other
#   direction: string — outbound (you pay them) | inbound (they pay you) | both
#   match:    list    — substrings to match against statement descriptions
#   notes:    string? — free text

vendors:
  - name: "Sample Employer Inc."
    purpose: "Sample purpose — primary W-2 employer"
    category: "income"
    direction: "inbound"
    match: ["SAMPLE EMPLOYER", "SAMPLE EMP DD"]
    notes: "Sample notes — semi-monthly direct deposit"

  - name: "Sample Client LLC"
    purpose: "Sample purpose — 1099 consulting client"
    category: "income"
    direction: "inbound"
    match: ["SAMPLE CLIENT", "SAMPLE LLC ACH"]
    notes: "Sample notes — project-based"

