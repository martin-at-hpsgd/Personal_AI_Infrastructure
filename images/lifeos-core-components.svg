><text x="1084" y="262" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#9A9AA3">to verified done.</text><rect x="1318" y="96" width="234" height="196" rx="16" fill="#A855F7" fill-opacity="0.07" stroke="#A855F7" stroke-opacity="0.32" stroke-width="1.2"/><rect x="1338" y="116" width="44" height="44" rx="13" fill="#A855F7" fill-opacity="0.15" stroke="#A855F7" stroke-opacity="0.28" stroke-width="1"/><g transform="translate(1349,127) scale(0.9166666666666666)" fill="none" stroke="#A855F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></g><text x="1338" y="188" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#F5F5F7">The ISA</text><text x="1338" y="244" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#9A9AA3">One document for what</text><text x="1338" y="262" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#9A9AA3">“done” looks like.</text><rect x="48" y="314" width="234" height="196" rx="16" fill="#FFFFFF" fill-opacity="0.02" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="1.2"/><rect x="68" y="334" width="44" height="44" rx="13" fill="#6366F1" fill-opacity="0.15" stroke="#6366F1" stroke-opacity="0.28" stroke-width="1"/><g transform="translate(79,345) scale(0.9166666666666666)" fill="none" stroke="#6366F1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 22V7a1 1 0 0 0-1-1H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5a1 1 0 0 0-1-1H2"/><rect x="14" y="2" width="8" height="8" rx="1"/></g><text x="68" y="406" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#F5F5F7">