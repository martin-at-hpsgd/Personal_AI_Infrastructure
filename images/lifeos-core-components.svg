<text x="48" y="56" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#F5F5F7" letter-spacing="-0.5">LifeOS<tspan fill="#6E6E78" font-weight="500">  ·  Core Components</tspan></text><text x="1552" y="54" text-anchor="end" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#8B5CF6">Current → Ideal State</text><rect x="48" y="96" width="234" height="196" rx="16" fill="#3B82F6" fill-opacity="0.07" stroke="#3B82F6" stroke-opacity="0.32" stroke-width="1.2"/><rect x="68" y="116" width="44" height="44" rx="13" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-opacity="0.28" stroke-width="1"/><g transform="translate(79,127) scale(0.9166666666666666)" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></g><text x="68" y="188" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#F5F5F7">Current → Ideal</text><text x="68" y="210" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#F5F5F7">State</text><text x="68" y="244" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#9A9AA3">Name where you are and</text><text x="68" y="262" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#9A9AA3">where you want to go.</text><rect x="302" y="96" width="234" height="196" rx="16" fill="#22C55E" fill-opacity="0.07" stroke="#22C55E" stroke-opacity="0.32" stroke-width="1.2"/><rect x="322" y="116" width="44" height="44" rx="13" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-opacity="0.28" stroke-width="1"/><g transform="translate(333,127) scale(0.9166666666666666)" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 7h6v6"/><path d="m22 7-8.5 8.5-5-5L2 17"/></g><text x="322" y="188" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#F5F5F7">General Hill</text><text x="322" y="210" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#F5F5F7">Climbing</text><text x="322" y="244" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#9A9AA3">Pick the next move that</text><text x="322" y="262" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#9A9AA3">closes the gap.</text><rect x="556" y="96" width="234" height="196" rx="16" fill="#EAB308" fill-opacity="0.07" stroke="#EAB308" stroke-opacity="0.32" stroke-width="1.2"/><rect x="576" y="116" width="44" height="44" rx="13" fill="#EAB308" fill-opacity="0.15" stroke="#EAB308" stroke-opacity="0.28" stroke-width="1"/><g transform="translate(587,127) scale(0.9166666666666666)" fill="none" stroke="#EAB308" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/><path d="M20 2v4"/><path d="M22 4h-4"/><circle cx="4" cy="20" r="2"/></g><text x="576" y="188" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#F5F5F7">Euphoric Surprise</text><text x="576" y="244" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#9A9AA3">The 9–10 moment:</text><text x="576" y="262" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#9A9AA3">